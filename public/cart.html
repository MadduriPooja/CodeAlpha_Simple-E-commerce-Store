<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Neon E-Commerce</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">NEON STORE</a>
      <nav>
        <a href="index.html">Shop</a>
        <a href="cart.html">View Cart</a>
        <button onclick="logout()" class="btn-logout">Logout</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Your Cart</h1>
    
    <div class="glass-panel" style="padding: 2rem; max-width: 800px; margin: 0 auto;">
      <div id="cart-container">
        <ul id="cart-items" class="cart-list">
          <!-- Cart items will be loaded here -->
        </ul>
        
        <div class="cart-summary">
          <button onclick="placeOrder()" class="btn-primary" style="width: auto; padding: 1rem 3rem;">Place Order</button>
        </div>
      </div>
    </div>
  </main>

  <script src="utils.js"></script>
  <script>
    async function loadCart() {
      try {
        const res = await fetch('/api/cart');
        if (res.status === 401) {
          window.location.href = '/login.html';
          return;
        }
        
        const cartIds = await res.json();
        const cartList = document.getElementById('cart-items');
        
        if (cartIds.length === 0) {
          cartList.innerHTML = '<li style="text-align:center; color:var(--text-muted); padding: 2rem;">Your cart is empty.</li>';
          document.querySelector('.cart-summary').style.display = 'none';
          return;
        }

        // Fetch products to get names/prices
        const prodRes = await fetch('/api/products');
        const products = await prodRes.json();
        
        cartList.innerHTML = cartIds.map(id => {
          const item = products.find(p => p.id == id) || { name: `Product ${id}`, price: 0 };
          return `
            <li class="cart-item glass-panel" style="background: rgba(255,255,255,0.03); margin-bottom: 0.5rem; border-radius: 12px;">
              <div>
                <span style="font-weight:600; font-size:1.1rem">${item.name}</span>
                <div style="font-size:0.85rem; color:var(--text-muted)">ID: ${id}</div>
              </div>
              <span style="color:var(--accent-secondary); font-weight:700">$${item.price.toFixed(2)}</span>
            </li>
          `;
        }).join('');
      } catch (err) {
        console.error("Failed to load cart:", err);
      }
    }

    async function placeOrder() {
      const res = await fetch('/api/order', { method: 'POST' });
      if (res.ok) {
        showToast("Order placed successfully!", "success");
        setTimeout(() => window.location.href = '/index.html', 1500);
      } else {
        showToast("Failed to place order. Please try again.", "error");
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }

    loadCart();
  </script>
</body>
</html>
